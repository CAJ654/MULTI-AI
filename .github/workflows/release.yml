# Builds the Windows release packages and attaches them to a GitHub release.
#
# Triggered by pushing a tag like `v1.0.0`, or manually from the Actions tab
# (which builds and uploads the packages as a workflow artifact without
# publishing a release — useful for testing the pipeline itself).
#
# Packaging is Velopack's `vpk`, not Inno Setup. The reason is delta updates:
# vpk diffs each release against the previous one and emits a patch alongside
# the full package, so an existing install downloads a few MB instead of the
# whole app, and the app applies it itself behind a "Relaunch to Update"
# button. See app/lib/update_service.dart. installer/multi-ai.iss is no longer
# built by anything and is kept only for reference.
#
# The interesting constraint is that this cannot ship a self-contained bundle.
# The backend's dependencies are ~4.5GB installed (torch alone is 4.12GB,
# because the cu128 wheel carries the CUDA runtime), and a GitHub release asset
# is capped at 2GB. So the package carries the app, an embeddable CPython and
# the Cython-compiled backend — about 200MB — and the app pip-installs the rest
# on first launch. See app/lib/backend_process.dart.

name: Release (Windows)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # required to create the release and upload the installer

env:
  # Must match the embeddable runtime below at the minor version: the compiled
  # extensions are ABI-tagged (server.cp314-win_amd64.pyd) and CPython refuses
  # to load a .pyd built for a different minor version.
  PYTHON_VERSION: '3.14'
  PYTHON_EMBED_VERSION: '3.14.6'
  FLUTTER_VERSION: '3.44.4'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: pwsh
        run: |
          # A tag push releases that version; a manual run is an untagged test
          # build, labelled from the commit so two of them can't collide.
          #
          # Two things about the dev version are load-bearing, both learned the
          # hard way:
          #
          #  - It starts 0.0.1, not 0.0.0. `vpk pack` rejects anything below
          #    0.0.1 outright ("it must be >= 0.0.1"), which would fail every
          #    manual run - the exact path these builds exist to rehearse.
          #  - The run number goes in the *prerelease* segment, not just the
          #    build metadata after '+'. SemVer ignores build metadata when
          #    ordering versions, so `0.0.1-dev+aaaaaaa` and `0.0.1-dev+bbbbbbb`
          #    compare as equal and Velopack would treat the second test build
          #    as "not newer", skipping the delta generation being rehearsed.
          #    (vpk also drops the '+sha' from package filenames, so the run
          #    number is what actually keeps two builds distinct on disk. The
          #    sha stays on for traceability.)
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v', ''
          } else {
            $v = "0.0.1-dev.${{ github.run_number }}+$($env:GITHUB_SHA.Substring(0,7))"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "Building version $v"

      # ---------------------------------------------------------------
      # 1. Compile the Cython backend
      # ---------------------------------------------------------------
      # The .pyd files are git-ignored (platform- and version-specific), so
      # they are built here rather than committed. windows-latest ships the
      # MSVC build tools Cython needs.

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build the compiled backend
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel "Cython>=3.0"
          # --inplace puts each .pyd next to its .pyx, which is the layout the
          # staging step below copies and the runtime imports.
          python setup.py build_ext --inplace
          $pyds = Get-ChildItem Multi-AI\multi_ai -Recurse -Filter *.pyd
          Write-Output "Compiled $($pyds.Count) extension modules"
          if ($pyds.Count -lt 2) { throw "Backend build produced no extension modules" }

      - name: Smoke-test the compiled backend
        shell: pwsh
        run: |
          # Catches a build that "succeeded" but produced modules that cannot
          # actually be imported - far cheaper to find here than in an
          # installer a downloader is already running.
          $env:PYTHONPATH = "$PWD\Multi-AI"
          python -c "from multi_ai.server import run; import multi_ai.hardware; print('backend imports OK')"

      # ---------------------------------------------------------------
      # 2. Build the Flutter Windows app
      # ---------------------------------------------------------------

      # Must come before the Flutter build, not just before packaging. The app
      # depends on velopack_flutter, which is a flutter_rust_bridge package —
      # `flutter build windows` compiles its Rust crate as part of the build
      # and fails outright without a toolchain on PATH.
      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Flutter release
        shell: pwsh
        working-directory: app
        run: |
          flutter config --enable-windows-desktop
          # Redundant on Flutter 3.44 (it defaults to on) but stated because
          # the build depends on it: velopack_flutter ships its Rust core as a
          # code asset built by hook/build.dart, and with native assets off it
          # is silently not built. Cheap insurance against the default changing
          # under a FLUTTER_VERSION bump.
          flutter config --enable-native-assets
          flutter pub get
          flutter build windows --release --build-name=${{ steps.version.outputs.version }}

      # ---------------------------------------------------------------
      # 3. Assemble the package payload
      # ---------------------------------------------------------------
      # Everything lands in one tree, installer\staging\app, with the backend
      # nested at staging\app\backend. Inno used to merge two sibling trees at
      # install time via two [Files] entries; vpk pack takes a single --packDir
      # and lays it out verbatim, so the nesting has to exist here instead. The
      # invariant that matters is unchanged: backend\ sits beside the
      # executable, which is where BackendRuntime.backendDir looks for it.
      #
      # These three steps are ordered, not arbitrary. The Flutter tree is
      # copied first because Copy-Item into an *existing* directory nests the
      # source inside it rather than merging, so creating staging\app\backend
      # first would produce staging\app\Release\.

      - name: Stage the Flutter release tree
        shell: pwsh
        run: |
          # exe + DLLs + data\. All of it is required; the exe alone will not
          # launch.
          Copy-Item -Recurse -Force app\build\windows\x64\runner\Release installer\staging\app

      - name: Fetch embeddable CPython and pip
        shell: pwsh
        run: |
          $ver = "${{ env.PYTHON_EMBED_VERSION }}"
          New-Item -ItemType Directory -Force installer\staging\app\backend\python | Out-Null
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/$ver/python-$ver-embed-amd64.zip" -OutFile embed.zip
          Expand-Archive embed.zip -DestinationPath installer\staging\app\backend\python -Force

          # The embeddable distribution's ._pth replaces normal path setup and
          # ships with `import site` commented out. pip's zipapp needs the site
          # module, so re-enable it. (This does NOT make PYTHONPATH work - a
          # ._pth disables it outright, which is why the backend receives its
          # paths through MULTI_AI_PATH instead. See installer/runtime/bootstrap.py.)
          $pth = Get-ChildItem installer\staging\app\backend\python -Filter "python*._pth" | Select-Object -First 1
          (Get-Content $pth.FullName) -replace '^#\s*import site', 'import site' | Set-Content $pth.FullName -Encoding ascii

          # pip as a zipapp rather than an installed package: the interpreter
          # lives in the install directory and is replaced wholesale on every
          # update, so there is nowhere durable for a real pip install to go.
          # pip.pyz needs no install.
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/pip/pip.pyz" -OutFile installer\staging\app\backend\pip.pyz

      - name: Stage the compiled backend
        shell: pwsh
        run: |
          # .pyx sources and generated .c are build inputs, not runtime files -
          # excluding them keeps the payload small and stops anyone assuming
          # the .pyx is what runs.
          $dest = "installer\staging\app\backend\multi_ai"
          Copy-Item -Recurse -Force Multi-AI\multi_ai $dest
          Get-ChildItem $dest -Recurse -Include *.pyx,*.c | Remove-Item -Force
          Get-ChildItem $dest -Recurse -Directory -Filter __pycache__ | Remove-Item -Recurse -Force

          Copy-Item installer\runtime\bootstrap.py     installer\staging\app\backend\
          Copy-Item installer\runtime\requirements.txt installer\staging\app\backend\

          Write-Output "--- staged payload ---"
          $backend = Get-ChildItem installer\staging\app\backend -Recurse -File | Measure-Object Length -Sum
          $total   = Get-ChildItem installer\staging\app         -Recurse -File | Measure-Object Length -Sum
          "{0:N1} MB backend" -f ($backend.Sum / 1MB)
          "{0:N1} MB total (app + backend)" -f ($total.Sum / 1MB)

      - name: Verify the staged backend runs
        shell: pwsh
        run: |
          # Runs the bundled interpreter against the bundled backend exactly as
          # the app will. It cannot chat (torch is not installed - that is the
          # first-run download), but importing the server and serving
          # /api/models exercises the ._pth / MULTI_AI_PATH wiring, which is
          # the part most likely to be silently wrong.
          # _list_models() enumerates the roster from the model files present.
          # The staging tree has had its .pyx stripped, so this asserts the
          # enumeration finds the compiled .pyd modules instead — an empty list
          # here means a release that shows the app only its on-device fallback.
          # (Listing needs no torch; that is the first-run download.)
          $backend = "$PWD\installer\staging\app\backend"
          $env:MULTI_AI_PATH = $backend
          & "$backend\python\python.exe" -c "import sys; sys.path.insert(0, r'$backend'); from multi_ai.server import run, _list_models; n = len(_list_models()); assert n > 0, 'staged backend lists no models - roster enumeration is not finding the compiled .pyd modules'; print(f'bundled backend imports OK; /api/models lists {n} models')"

      # ---------------------------------------------------------------
      # 4. Pack the release
      # ---------------------------------------------------------------

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install the Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install -g vpk
          # `dotnet tool install -g` drops shims in ~\.dotnet\tools, which is
          # not on PATH for subsequent steps unless it is added explicitly.
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Pack
        shell: pwsh
        run: |
          # Fetch the previous release's packages so pack has something to diff
          # against. This is what makes the update a delta rather than a full
          # ~200MB re-download. On the very first release there is nothing to
          # fetch: vpk logs "No releases found" and exits 0, so this does not
          # need guarding, and that run legitimately produces no delta.
          #
          # It reads the latest *published* release, matching what installed
          # apps see (see below). If the previous version is still sitting as
          # an unpublished draft, this diffs against whatever was published
          # before it - so publish or delete each draft before tagging the next
          # version, or a release simply ships without a delta.
          vpk download github `
              --repoUrl https://github.com/${{ github.repository }} `
              --token ${{ secrets.GITHUB_TOKEN }} `
              -o Releases

          # --packId is this app's permanent identity, the way Inno's AppId GUID
          # was: Velopack matches installs on it and derives the install root
          # (%LOCALAPPDATA%\MultiAI) from it. Changing it later orphans every
          # existing install, so it does not change.
          vpk pack `
              --packId MultiAI `
              --packTitle "Multi-AI" `
              --packAuthors "CAJ654" `
              --packVersion ${{ steps.version.outputs.version }} `
              --packDir installer\staging\app `
              --mainExe multi_ai.exe `
              -o Releases

          # vpk download left the previous version's full package here purely
          # as a diff source. Clients never fetch it - an install applying a
          # delta patches the copy it already has on disk, and one too far
          # behind for the delta chain falls back to the *new* full package -
          # so shipping it again would add ~200MB to every release for nothing.
          $version = "${{ steps.version.outputs.version }}"
          Get-ChildItem Releases\*-full.nupkg |
            Where-Object { $_.Name -ne "MultiAI-$version-full.nupkg" } |
            Remove-Item -Force

          Write-Output "--- release assets ---"
          Get-ChildItem Releases | ForEach-Object {
            "{0,-44} {1,8:N1} MB" -f $_.Name, ($_.Length / 1MB)
          }

      - name: Check the assets fit GitHub's limit
        shell: pwsh
        run: |
          # The 2GB cap is per asset, not per release, so every file has to be
          # checked rather than just the largest single artifact. If this trips,
          # something heavy leaked into the payload that belongs in the
          # first-run download instead.
          $over = Get-ChildItem Releases -File | Where-Object { $_.Length -gt 2GB }
          if ($over) {
            throw "Over GitHub's 2 GB per-asset limit: $($over.Name -join ', ')"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: MultiAI-${{ steps.version.outputs.version }}
          path: Releases/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # The whole folder, not just the installer. releases.win.json is the
          # feed installed apps read, and the .nupkg files are what they
          # download; an installer on its own would leave every existing
          # install unable to see the release at all.
          files: Releases/*
          # Stays a draft until reviewed - and that review is now also the
          # update gate. Installed apps read the feed from
          # /releases/latest/download/, which GitHub resolves to the latest
          # *published* release, so a draft is invisible to them. Publishing is
          # what ships the update. Do not auto-publish to work around this.
          draft: true
          generate_release_notes: true
          body: |
            ## Install

            New here? Download **MultiAI-win-Setup.exe** below and run it. The
            other files are for the in-app updater.

            **Already running Multi-AI?** Do nothing. The app checks for updates
            on launch, downloads this version in the background, and shows a
            **Relaunch to Update** button when it is ready. The download is a
            small patch, not the whole app.

            Windows SmartScreen will warn that the publisher is unknown — the
            installer is unsigned. Choose *More info* → *Run anyway*.

            **First launch downloads about 2.5 GB** of AI runtime (PyTorch and
            friends). That happens once, and updates do not repeat it. You can
            skip it and still use the on-device models, which need no backend.

            **An NVIDIA GPU is recommended.** The server-backed models are
            4-bit quantized for consumer VRAM; the app rates each model against
            your hardware and tells you before you download one.
